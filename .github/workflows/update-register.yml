name: Update Register

on:
  schedule:
    # Weekly on Mondays at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Update mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
      enrich_bio:
        description: 'Include bio enrichment (DOB, nationality, position, aliases). Adds ~90min. Full mode only.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      # Determine mode: scheduled runs use incremental, manual dispatch uses selected mode
      - name: Set update mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          fi
          echo "Update mode: $(cat "$GITHUB_OUTPUT" | grep mode | cut -d= -f2)"

      # --- INCREMENTAL PATH ---

      - name: Incremental update
        if: steps.mode.outputs.mode == 'incremental'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python scripts/incremental-update.py

      # --- FULL SEED PATH ---

      - name: Extract entities from Wikidata
        if: steps.mode.outputs.mode == 'full'
        env:
          ENRICH_BIO: ${{ inputs.enrich_bio }}
        run: |
          FLAGS="--ids-only"
          if [ "$ENRICH_BIO" = "true" ]; then
            FLAGS=""
          fi
          python scripts/fetch-wikidata-entities.py $FLAGS

      - name: Validate fetch output
        if: steps.mode.outputs.mode == 'full'
        run: |
          python3 -c "
          import json
          from pathlib import Path
          data_dir = Path('data/json')
          total = 0
          for name in ['players', 'teams', 'coachs', 'competitions', 'seasons']:
              path = data_dir / f'{name}.json'
              if not path.exists():
                  if name in ('competitions', 'seasons'):
                      print(f'  {name}: not found (optional)')
                      continue
                  print(f'MISSING: {path}')
                  exit(1)
              count = len(json.load(open(path)))
              print(f'  {name}: {count:,}')
              total += count
          print(f'  total: {total:,}')
          if total < 100000:
              print(f'FAILED: only {total:,} entities (expected 400K+)')
              exit(1)
          print('Validation passed')
          "

      - name: Snapshot D1 before seed
        if: steps.mode.outputs.mode == 'full'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute football-entities --remote \
            --command="SELECT type, COUNT(*) as count FROM entities GROUP BY type;"

      - name: Seed into D1
        if: steps.mode.outputs.mode == 'full'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python scripts/seed-wikidata-d1.py

      # --- SHARED STEPS (both paths) ---

      - name: Verify D1 counts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Entities ==="
          wrangler d1 execute football-entities --remote \
            --command="SELECT type, COUNT(*) as count FROM entities GROUP BY type;"
          echo "=== Provider IDs ==="
          wrangler d1 execute football-entities --remote \
            --command="SELECT COUNT(*) as count FROM provider_ids;"
          echo "=== Custom IDs ==="
          wrangler d1 execute football-entities --remote \
            --command="SELECT COUNT(*) as count FROM custom_ids;"

      - name: Fetch custom IDs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python scripts/fetch-custom-ids.py

      - name: Export CSVs
        run: python scripts/export-csv.py

      - name: Regenerate sample CSVs
        run: |
          for f in data/people.csv data/teams.csv data/names.csv data/competitions.csv data/seasons.csv; do
            base=$(basename "$f")
            if [ -f "$f" ]; then
              (head -1 "$f"; tail -n +2 "$f" | awk 'BEGIN{srand(42)} {print rand() "\t" $0}' | sort -n | head -50 | cut -f2-) > "data/samples/$base"
            fi
          done

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: weekly register update"
            git push
          fi
