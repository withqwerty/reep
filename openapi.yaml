openapi: 3.0.3
info:
  title: The Reep Register
  description: |
    The football entity register. Resolve player, team, coach, competition, and season IDs across
    Transfermarkt, FBref, Sofascore, Understat, WhoScored, and 40+ data providers.

    492,000+ entities with cross-provider ID mappings sourced from Wikidata
    and custom verified sources. Updated weekly.

    Every entity has a stable Reep ID (`reep_<type_prefix><8hex>`) as the canonical
    identifier. Wikidata QIDs are available as a convenience field where the entity
    exists in Wikidata.

    People who are both players and coaches (e.g. Pep Guardiola) have separate
    records with type-specific Reep IDs. The unique key is `reep_id`.

    All data is open source: https://github.com/withqwerty/reep
  version: 2.0.0
  contact:
    name: withqwerty
    url: https://github.com/withqwerty/reep

servers:
  - url: https://reep-api.rahulkeerthi2-95d.workers.dev

paths:
  /search:
    get:
      operationId: searchEntities
      summary: Search entities by name
      description: |
        Full-text search across players, teams, coaches, and competitions by name or alias.
        Seasons are excluded from default search to avoid noise; use `type=season` to search seasons explicitly.
        Uses prefix matching with BM25 relevance ranking (e.g. "Cole Palm" matches "Cole Palmer").
        Diacritics-insensitive ("Muller" matches "Müller").
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          example: Cole Palmer
          description: Name to search for (prefix matching on name and aliases)
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [player, team, coach, competition, season]
          description: Filter by entity type
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Maximum results to return
      responses:
        "200":
          description: Search results ranked by relevance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              example:
                results:
                  - reep_id: reep_p2804f5db
                    qid: Q99760796
                    type: player
                    name_en: Cole Palmer
                    aliases_en: Cole Jermaine Palmer
                    date_of_birth: "2002-05-06"
                    nationality: United Kingdom
                    position: attacking midfielder
                    external_ids:
                      wikidata: Q99760796
                      transfermarkt: "568177"
                      fbref: dc7f8a28
                      sofascore: "982780"
                      soccerway: "525801"
                count: 1
        "400":
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lookup:
    get:
      operationId: lookupById
      summary: Look up entity by Reep ID or Wikidata QID
      description: |
        Exact lookup by Reep ID or Wikidata QID. The ID type is auto-detected:
        - `reep_p...` / `reep_t...` / `reep_c...` / `reep_l...` / `reep_s...` → Reep ID lookup
        - `Q...` → Wikidata QID lookup (may return multiple records for dual-role people)

        Also accepts the legacy `?qid=` parameter for backwards compatibility.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
          example: reep_p2804f5db
          description: Reep ID (reep_p...) or Wikidata QID (Q...)
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [player, team, coach, competition, season]
          description: Filter by entity type (only needed for QID lookups with dual-role people)
      responses:
        "200":
          description: Entity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupResponse"
        "400":
          description: Missing id parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /resolve:
    get:
      operationId: resolveProviderId
      summary: Resolve a provider ID to all other IDs
      description: |
        Given a provider name and ID, find the entity and return all cross-provider IDs.
        This is the core use case: "I have a Transfermarkt ID, what's the FBref ID?"
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
            enum:
              - wikidata
              - transfermarkt
              - transfermarkt_manager
              - transfermarkt_player
              - fbref
              - fbref_verified
              - soccerway
              - sofascore
              - flashscore
              - opta
              - premier_league
              - 11v11
              - espn
              - national_football_teams
              - worldfootball
              - soccerbase
              - kicker
              - uefa
              - lequipe
              - fff_fr
              - serie_a
              - besoccer
              - footballdatabase_eu
              - eu_football_info
              - hugman
              - german_fa
              - statmuse_pl
              - sofifa
              - soccerdonna
              - dongqiudi
              - playmakerstats
              - understat
              - whoscored
              - clubelo
              - sportmonks
              - api_football
              - fotmob
              - fpl_code
              - thesportsdb
              - impect
              - wyscout
              - skillcorner
              - heimspiel
          example: transfermarkt
          description: Source provider name
        - name: id
          in: query
          required: true
          schema:
            type: string
          example: "568177"
          description: ID from the source provider
      responses:
        "200":
          description: Resolved entity with all provider IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupResponse"
        "400":
          description: Missing provider or id parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /batch/lookup:
    post:
      operationId: batchLookup
      summary: Look up multiple IDs in one request
      description: |
        Batch lookup by Reep IDs or Wikidata QIDs. Accepts a mix of both.
        A single QID may return multiple records if the person is both a player and coach.
        Results are flattened into a single array. Maximum 100 IDs per request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  maxItems: 100
                  description: Array of Reep IDs or Wikidata QIDs
            example:
              ids: ["reep_p2804f5db", "Q11893"]
      responses:
        "200":
          description: Batch lookup results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchLookupResponse"
        "400":
          description: Invalid body, empty ids array, or exceeds 100 ID limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /batch/resolve:
    post:
      operationId: batchResolve
      summary: Resolve multiple provider IDs in one request
      description: |
        Batch resolve provider IDs to entities. Maximum 100 items per request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [provider, id]
                    properties:
                      provider:
                        type: string
                      id:
                        type: string
                  maxItems: 100
            example:
              items:
                - provider: transfermarkt
                  id: "568177"
                - provider: fbref
                  id: dea698d9
      responses:
        "200":
          description: Batch resolve results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResolveResponse"
        "400":
          description: Invalid body, empty items array, or exceeds 100 item limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      summary: Database statistics
      description: Returns entity counts by type and ID coverage by provider.
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

components:
  schemas:
    Entity:
      type: object
      properties:
        reep_id:
          type: string
          description: Universal Reep ID (reep_<type_prefix><8hex>). This is the canonical identifier.
        qid:
          type: string
          nullable: true
          description: Wikidata QID (convenience field, null for entities not in Wikidata)
        type:
          type: string
          enum: [player, team, coach]
        name_en:
          type: string
        aliases_en:
          type: string
          nullable: true
        full_name:
          type: string
          nullable: true
        date_of_birth:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
          description: For players only
        current_team_reep_id:
          type: string
          nullable: true
          description: Reep ID of current team (players only)
        height_cm:
          type: number
          nullable: true
        country:
          type: string
          nullable: true
          description: For teams only
        founded:
          type: string
          nullable: true
          description: For teams only
        stadium:
          type: string
          nullable: true
          description: For teams only
        competition_reep_id:
          type: string
          nullable: true
          description: For seasons only — Reep ID of the parent competition
        source:
          type: string
          description: Provenance (wikidata, opta, etc.)
        external_ids:
          type: object
          additionalProperties:
            type: string
          description: Map of provider name to external ID (includes wikidata QID)

    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        count:
          type: integer

    LookupResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        count:
          type: integer

    BatchLookupResponse:
      type: object
      properties:
        results:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/Entity"
              - type: object
                properties:
                  id:
                    type: string
                  error:
                    type: string
                    enum: [not_found]
        count:
          type: integer

    BatchResolveResponse:
      type: object
      properties:
        results:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/Entity"
              - type: object
                properties:
                  provider:
                    type: string
                  id:
                    type: string
                  error:
                    type: string
                    enum: [not_found, missing_fields]
        count:
          type: integer

    StatsResponse:
      type: object
      properties:
        total_entities:
          type: integer
        by_type:
          type: object
          additionalProperties:
            type: integer
        by_provider:
          type: object
          additionalProperties:
            type: integer
        custom_ids_count:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
